<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-label="AgentWorks">
  <!-- chip body (the contract) -->
  <rect x="3" y="3" width="94" height="94" rx="22" fill="#1d2030"/>
  <!-- escrow seam (top + bottom) -->
  <line x1="50" y1="15" x2="50" y2="40" stroke="#f7f5ee" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="50" y2="85" stroke="#f7f5ee" stroke-width="5" stroke-linecap="round"/>
  <!-- locked node = escrowed USDC, the one Settle-Blue accent -->
  <rect x="41" y="41" width="18" height="18" rx="4" fill="#3568d4"/>
  <!-- A-peak (Client) -->
  <path d="M19 71 L31 28 L43 71" fill="none" stroke="#f7f5ee" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- W-valley (Provider) -->
  <path d="M57 28 L63 71 L69 45 L75 71 L81 28" fill="none" stroke="#f7f5ee" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
