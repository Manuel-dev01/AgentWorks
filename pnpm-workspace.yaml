# pnpm workspace. Only Node packages are listed here.
# /contracts (Foundry) and /agents (Python) are managed by forge and pip/uv respectively,
# not by pnpm — they are intentionally NOT workspace members.
packages:
  - "web"
# `sharp` is Next.js's optional image-optimizer native dep. Approving its install script clears
# pnpm's ERR_PNPM_IGNORED_BUILDS on both local installs and Vercel builds (sharp ships prebuilt
# binaries, so this is a fast download, not a from-source compile).
allowBuilds:
  sharp: true
